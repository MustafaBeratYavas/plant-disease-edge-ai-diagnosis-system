name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: |
          pyproject.toml
          requirements.lock
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -c requirements.lock -e ".[dev]"
        python -m pip check
    - name: Check Ruff formatting
      run: |
        python -m ruff format src/ scripts/ tests/ --check
    - name: Run Ruff linter
      run: |
        python -m ruff check src/ scripts/ tests/
    - name: Run MyPy
      run: |
        python -m mypy src/
    - name: Build Python package
      run: |
        python -m pip wheel --no-deps --wheel-dir dist .
    - name: Run Pytest
      run: |
        python -m pytest --cov=src --cov=scripts --cov-report=term-missing --cov-report=xml

  flutter-test:
    name: Flutter
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v6
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.35.0'
        channel: 'stable'
        cache: true
    - name: Install dependencies
      working-directory: ./mobile
      run: flutter pub get --enforce-lockfile
    - name: Check Dart formatting
      working-directory: ./mobile
      run: dart format --line-length 100 --set-exit-if-changed lib/ test/
    - name: Analyze code
      working-directory: ./mobile
      run: flutter analyze
    - name: Run tests
      working-directory: ./mobile
      run: flutter test

  docker-smoke:
    name: Docker smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: python-test
    steps:
    - uses: actions/checkout@v6
    - name: Build and smoke-test Python ML image
      run: make docker-smoke
