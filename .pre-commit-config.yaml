# Defines local pre-commit quality gates for Python and Flutter code.

repos:
  # Python quality gates.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml, src]
        additional_dependencies: []
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        exclude: \.gitkeep$
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-xml
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: \.bat$
      - id: check-added-large-files
        args: [--maxkb=5000]

  # Flutter quality gates.
  - repo: local
    hooks:
      - id: dart-format
        name: Dart Format
        entry: dart
        args: [format, --line-length, "100", --set-exit-if-changed, mobile/lib, mobile/test]
        language: system
        files: ^mobile/(lib|test)/.*\.dart$
        pass_filenames: false

      - id: flutter-analyze
        name: Flutter Analyze
        entry: flutter
        args: [analyze, mobile]
        language: system
        files: ^mobile/(lib|test)/.*\.dart$
        pass_filenames: false
